body { font-family: Arial, sans-serif; background: #f4f6f9; color: #333; padding: 20px; }

.controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; align-items: center; }

.btn-group { display: flex; }

.btn-group button:last-child  { border-radius: 0 6px 6px 0; border-right: 1px solid #1F4E79; }
.btn-group button.active { background: #1F4E79; color: #fff; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(155px, 1fr)); gap: 10px; margin-bottom: 16px; }
.metric { background: #fff; border-radius: 10px; padding: 13px 16px; border: 1px solid #e0e6ef; }
.metric .lbl { font-size: 11px; color: #888; margin-bottom: 3px; }
.metric .val { font-size: 21px; font-weight: 700; color: #1a2e4a; line-height: 1.2; }
.metric .sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.metric.c1 .val { color: #1F4E79; } .metric.c2 .val { color: #b05e00; } .metric.ct .val { color: #2a6e1a; }
.stats-card { background: #fff; border-radius: 10px; padding: 16px 20px; border: 1px solid #e0e6ef; margin-bottom: 16px; }
.stats-card-title { font-size: 13px; font-weight: 600; color: #555; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.stats-badge { font-size: 11px; padding: 2px 9px; border-radius: 10px; font-weight: 500; }
.badge-m { background: #e8f0fe; color: #1F4E79; } .badge-d { background: #fff3e0; color: #b05e00; }
.stats-unit { font-size: 11px; color: #aaa; font-weight: 400; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
.sb { border: 1px solid #e8edf3; border-radius: 8px; overflow: hidden; }
.sb-hd { padding: 6px 12px; font-size: 12px; font-weight: 700; color: #fff; }
.hd1{background:#1F4E79;} .hd2{background:#C0622A;} .hdt{background:#2a6e1a;}
.sb table { width:100%; border-collapse:collapse; font-size:12.5px; }
.sb td { padding: 7px 12px; border-bottom: 1px solid #f0f4f8; }
.sb tr:last-child td { border-bottom: none; }
.sb .nm { color: #555; } .sb .vl { font-weight: 600; text-align: right; color: #222; } .sb .dt { font-size: 11px; color: #999; text-align: right; }

function setView(v){
  view=v;
  document.getElementById('btnM').classList.toggle('active',v==='monthly');

const getYr=()=>document.getElementById('yrSel').value;
const getWs=()=>document.getElementById('wsSel').value;
const fMD=()=>{const y=getYr();return y==='all'?MD:MD.filter(r=>r.m.startsWith(y));};

function calcStats(arr){
  const v=arr.filter(x=>x!=null&&x>0);
  if(!v.length)return null;
  const s=[...v].sort((a,b)=>a-b),n=s.length,mid=Math.floor(n/2);
  return{max:Math.max(...v),min:Math.min(...v),avg:v.reduce((a,b)=>a+b)/n,med:n%2?s[mid]:(s[mid-1]+s[mid])/2,n};
}

function sbHTML(title,cls,st,arr,fn,unit){
  if(!st)return`<div class="sb"><div class="sb-hd ${cls}">${title}</div><table><tr><td colspan="3" style="color:#aaa;text-align:center;padding:12px">暂无数据</td></tr></table></div>`;
  const mi=arr.findIndex(r=>Math.abs(fn(r)-st.max)<0.01);
  const ni=arr.findIndex(r=>Math.abs(fn(r)-st.min)<0.01);
  const ml=mi>=0?(arr[mi].m||arr[mi].d||''):'';
  const nl=ni>=0?(arr[ni].m||arr[ni].d||''):'';
  return`<div class="sb"><div class="sb-hd ${cls}">${title}</div><table>
    <tr><td class="nm">最大值 <span class="tag tmax">MAX</span></td><td class="vl">${st.max.toFixed(2)} ${unit}</td><td class="dt">${ml}</td></tr>
    <tr><td class="nm">最小值 <span class="tag tmin">MIN</span></td><td class="vl">${st.min.toFixed(2)} ${unit}</td><td class="dt">${nl}</td></tr>
    <tr><td class="nm">平均值 <span class="tag tavg">AVG</span></td><td class="vl">${st.avg.toFixed(2)} ${unit}</td><td class="dt">${st.n} 条</td></tr>
    <tr><td class="nm">中位数 <span class="tag tmed">MED</span></td><td class="vl">${st.med.toFixed(2)} ${unit}</td><td class="dt"></td></tr>
  </table></div>`;
}

    const data=fMD();badge.textContent='月度';badge.className='stats-badge badge-m';unitEl.textContent='单位：吨/月';
    const s1=calcStats(data.map(r=>r.w1)),s2=calcStats(data.map(r=>r.w2)),st=calcStats(data.map(r=>r.w1+r.w2));
    if(w==='w1')        html=sbHTML('一车间','hd1',s1,data,r=>r.w1,'吨');
    else if(w==='w2')   html=sbHTML('二车间','hd2',s2,data,r=>r.w2,'吨');
    else if(w==='compare') html=sbHTML('一车间','hd1',s1,data,r=>r.w1,'吨')+sbHTML('二车间','hd2',s2,data,r=>r.w2,'吨');
    else html=sbHTML('一二车间合计','hdt',st,data,r=>r.w1+r.w2,'吨')+sbHTML('一车间','hd1',s1,data,r=>r.w1,'吨')+sbHTML('二车间','hd2',s2,data,r=>r.w2,'吨');
  } else {
    const data=fDD();badge.textContent='每日';badge.className='stats-badge badge-d';unitEl.textContent='单位：吨/天';
    const s1=calcStats(data.map(r=>r.w1)),s2=calcStats(data.map(r=>r.w2));
    const totArr=data.map(r=>r.w1!=null||r.w2!=null?(r.w1||0)+(r.w2||0):null);
    const st=calcStats(totArr);
    if(w==='w1')        html=sbHTML('一车间（日）','hd1',s1,data,r=>r.w1,'吨/天');
    else if(w==='w2')   html=sbHTML('二车间（日）','hd2',s2,data,r=>r.w2,'吨/天');
    else if(w==='compare') html=sbHTML('一车间（日）','hd1',s1,data,r=>r.w1,'吨/天')+sbHTML('二车间（日）','hd2',s2,data,r=>r.w2,'吨/天');
    else html=sbHTML('合计（日）','hdt',st,data,r=>(r.w1||0)+(r.w2||0),'吨/天')+sbHTML('一车间（日）','hd1',s1,data,r=>r.w1,'吨/天')+sbHTML('二车间（日）','hd2',s2,data,r=>r.w2,'吨/天');
  }
  document.getElementById('sGrid').innerHTML=html;
}

function makeAnn(vals,sfx){
  const st=calcStats(vals.filter(v=>v!=null));if(!st)return{};
  return{
    [`av_${sfx}`]:{type:'line',yMin:st.avg,yMax:st.avg,borderColor:'#e67e22',borderWidth:1.5,borderDash:[6,4],label:{display:true,content:`均值 ${st.avg.toFixed(1)}`,position:'end',backgroundColor:'#e67e2233',color:'#b35900',font:{size:10},padding:{x:4,y:2}}},
    [`md_${sfx}`]:{type:'line',yMin:st.med,yMax:st.med,borderColor:'#8e44ad',borderWidth:1.5,borderDash:[4,4],label:{display:true,content:`中位 ${st.med.toFixed(1)}`,position:'start',backgroundColor:'#8e44ad22',color:'#5b2c8d',font:{size:10},padding:{x:4,y:2}}},
    [`mx_${sfx}`]:{type:'line',yMin:st.max,yMax:st.max,borderColor:'#c0392b',borderWidth:1,borderDash:[3,5],label:{display:true,content:`最大 ${st.max.toFixed(1)}`,position:'center',backgroundColor:'#c0392b22',color:'#7b241c',font:{size:10},padding:{x:4,y:2}}},
    [`mn_${sfx}`]:{type:'line',yMin:st.min,yMax:st.min,borderColor:'#27ae60',borderWidth:1,borderDash:[3,5],label:{display:true,content:`最小 ${st.min.toFixed(1)}`,position:'center',backgroundColor:'#27ae6022',color:'#1a7a43',font:{size:10},padding:{x:4,y:2}}},
  };
}

function renderLegend(keys){
  const cfg={w1:{c:C1,w:12,h:12,n:'一车间'},w2:{c:C2,w:12,h:12,n:'二车间'},total:{c:CT,w:12,h:12,n:'合计'},avg:{c:'#e67e22',w:18,h:3,n:'均值线'},med:{c:'#8e44ad',w:18,h:3,n:'中位线'},max:{c:'#c0392b',w:18,h:3,n:'最大值'},min:{c:'#27ae60',w:18,h:3,n:'最小值'}};
  document.getElementById('legend').innerHTML=keys.map(k=>`<span><i style="background:${cfg[k].c};width:${cfg[k].w}px;height:${cfg[k].h}px"></i>${cfg[k].n}</span>`).join('');
}

function renderMetrics(){
  if(view==='monthly'){
    const data=fMD();
    const t1=data.reduce((s,r)=>s+r.w1,0),t2=data.reduce((s,r)=>s+r.w2,0);
    const d1=data.reduce((s,r)=>s+r.d1,0),d2=data.reduce((s,r)=>s+r.d2,0);
    document.getElementById('metrics').innerHTML=`
      <div class="metric c1"><div class="lbl">一车间 累计</div><div class="val">${t1.toFixed(1)}</div><div class="sub">吨 · 日均 ${d1>0?(t1/d1).toFixed(2):'-'} 吨</div></div>
      <div class="metric c2"><div class="lbl">二车间 累计</div><div class="val">${t2.toFixed(1)}</div><div class="sub">吨 · 日均 ${d2>0?(t2/d2).toFixed(2):'-'} 吨</div></div>
      <div class="metric ct"><div class="lbl">合计</div><div class="val">${(t1+t2).toFixed(1)}</div><div class="sub">吨 · ${data.length} 个月</div></div>
      <div class="metric"><div class="lbl">月均</div><div class="val">${((t1+t2)/Math.max(data.length,1)).toFixed(1)}</div><div class="sub">吨/月</div></div>`;
  } else {
    const data=fDD();
    const v1=data.filter(r=>r.w1>0),v2=data.filter(r=>r.w2>0);
    const t1=v1.reduce((s,r)=>s+r.w1,0),t2=v2.reduce((s,r)=>s+r.w2,0);
    document.getElementById('metrics').innerHTML=`
      <div class="metric c1"><div class="lbl">一车间 有效天数</div><div class="val">${v1.length}</div><div class="sub">天 · 日均 ${v1.length>0?(t1/v1.length).toFixed(2):'-'} 吨</div></div>
      <div class="metric c2"><div class="lbl">二车间 有效天数</div><div class="val">${v2.length}</div><div class="sub">天 · 日均 ${v2.length>0?(t2/v2.length).toFixed(2):'-'} 吨</div></div>
      <div class="metric ct"><div class="lbl">一车间 用汽合计</div><div class="val">${t1.toFixed(1)}</div><div class="sub">吨</div></div>
      <div class="metric"><div class="lbl">二车间 用汽合计</div><div class="val">${t2.toFixed(1)}</div><div class="sub">吨</div></div>`;
  }
}

function renderCharts(){
  if(ch1){ch1.destroy();ch1=null;} if(ch2){ch2.destroy();ch2=null;}
  const w=getWs();

  if(view==='monthly'){
    const data=fMD(),labels=data.map(r=>r.m.slice(2));
    const v1=data.map(r=>+r.w1.toFixed(2)),v2=data.map(r=>+r.w2.toFixed(2)),vt=data.map(r=>+(r.w1+r.w2).toFixed(2));
    const a1=data.map(r=>r.d1>0?+(r.w1/r.d1).toFixed(2):null),a2=data.map(r=>r.d2>0?+(r.w2/r.d2).toFixed(2):null);
    document.getElementById('t1').textContent='月度蒸汽用量（吨）';
    document.getElementById('wrap1').style.height='340px';
    let ds=[],ann={},lk=[];
    if(w==='both')     {ds=[{label:'合计',data:vt,backgroundColor:CT+'88',borderColor:CT,borderWidth:1.5}];ann=makeAnn(vt,'t');lk=['total','avg','med','max','min'];}
    else if(w==='w1')  {ds=[{label:'一车间',data:v1,backgroundColor:C1+'88',borderColor:C1,borderWidth:1.5}];ann=makeAnn(v1,'1');lk=['w1','avg','med','max','min'];}
    else if(w==='w2')  {ds=[{label:'二车间',data:v2,backgroundColor:C2+'88',borderColor:C2,borderWidth:1.5}];ann=makeAnn(v2,'2');lk=['w2','avg','med','max','min'];}
    else {ds=[{label:'一车间',data:v1,backgroundColor:C1+'bb',borderColor:C1,borderWidth:1.5,stack:'s'},{label:'二车间',data:v2,backgroundColor:C2+'bb',borderColor:C2,borderWidth:1.5,stack:'s'}];ann=makeAnn(vt,'t');lk=['w1','w2','avg','med','max','min'];}
    renderLegend(lk);
    ch1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y} 吨`}},annotation:{annotations:ann}},scales:{x:{stacked:w==='compare',ticks:{autoSkip:true,maxTicksLimit:20,maxRotation:45,font:{size:11}},grid:{display:false}},y:{stacked:w==='compare',ticks:{callback:v=>v+'吨',font:{size:11}},grid:{color:'#eee'}}}}});
    // chart2: daily avg line
    document.getElementById('t2').textContent='月均日用量（吨/天）';
    let ds2=[],ann2={};
    if(w==='both'||w==='compare'){
      ds2=[{label:'一车间日均',data:a1,borderColor:C1,backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:2},{label:'二车间日均',data:a2,borderColor:C2,backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:2}];
      const va1=a1.filter(v=>v),va2=a2.filter(v=>v);
      if(va1.length){const m=va1.reduce((s,v)=>s+v)/va1.length;ann2.a1={type:'line',yMin:m,yMax:m,borderColor:C1,borderWidth:1,borderDash:[5,4],label:{display:true,content:`一均 ${m.toFixed(2)}`,position:'start',backgroundColor:C1+'22',color:'#0d3557',font:{size:10},padding:{x:3,y:2}}};}
      if(va2.length){const m=va2.reduce((s,v)=>s+v)/va2.length;ann2.a2={type:'line',yMin:m,yMax:m,borderColor:C2,borderWidth:1,borderDash:[5,4],label:{display:true,content:`二均 ${m.toFixed(2)}`,position:'end',backgroundColor:C2+'22',color:'#7a3a14',font:{size:10},padding:{x:3,y:2}}};}
    } else if(w==='w1') {ds2=[{label:'一车间日均',data:a1,borderColor:C1,backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:2}];}
    else {ds2=[{label:'二车间日均',data:a2,borderColor:C2,backgroundColor:'transparent',tension:0.3,pointRadius:3,borderWidth:2}];}
    ch2=new Chart(document.getElementById('c2'),{type:'line',data:{labels,datasets:ds2},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y??'-'} 吨/天`}},annotation:{annotations:ann2}},scales:{x:{ticks:{autoSkip:true,maxTicksLimit:20,maxRotation:45,font:{size:11}},grid:{display:false}},y:{ticks:{callback:v=>v+'吨',font:{size:11}},grid:{color:'#eee'}}}}});
  } else {
    // ── daily view ──────────────────────────────────────
    const data=fDD(),labels=data.map(r=>r.d.slice(5));
    const v1=data.map(r=>r.w1!=null?+r.w1.toFixed(3):null);
    const v2=data.map(r=>r.w2!=null?+r.w2.toFixed(3):null);
    const vt=data.map(r=>r.w1!=null||r.w2!=null?+((r.w1||0)+(r.w2||0)).toFixed(3):null);
    const h=Math.max(300,labels.length*10+80);
    document.getElementById('t1').textContent='每日蒸汽用量（吨/天）';
    document.getElementById('wrap1').style.height=h+'px';
    let ds=[],ann={},lk=[];
    if(w==='both')     {ds=[{label:'合计',data:vt,backgroundColor:CT+'88',borderColor:CT,borderWidth:1}];ann=makeAnn(vt.filter(v=>v),'t');lk=['total','avg','med','max','min'];}
    else if(w==='w1')  {ds=[{label:'一车间',data:v1,backgroundColor:C1+'88',borderColor:C1,borderWidth:1}];ann=makeAnn(v1.filter(v=>v),'1');lk=['w1','avg','med','max','min'];}
    else if(w==='w2')  {ds=[{label:'二车间',data:v2,backgroundColor:C2+'88',borderColor:C2,borderWidth:1}];ann=makeAnn(v2.filter(v=>v),'2');lk=['w2','avg','med','max','min'];}
    else {ds=[{label:'一车间',data:v1,backgroundColor:C1+'bb',borderColor:C1,borderWidth:1},{label:'二车间',data:v2,backgroundColor:C2+'bb',borderColor:C2,borderWidth:1}];ann={};lk=['w1','w2'];}
    renderLegend(lk);
    ch1=new Chart(document.getElementById('c1'),{type:'bar',data:{labels,datasets:ds},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y??'-'} 吨`}},annotation:{annotations:ann}},scales:{x:{ticks:{autoSkip:true,maxTicksLimit:28,maxRotation:60,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>v+'吨',font:{size:11}},grid:{color:'#eee'}}}}});
    // chart2: 7-day rolling average
    document.getElementById('t2').textContent='7日滚动平均（吨/天）';
    function roll(arr){return arr.map((v,i)=>{const sl=arr.slice(Math.max(0,i-6),i+1).filter(x=>x!=null&&x>0);return sl.length?+(sl.reduce((s,x)=>s+x)/sl.length).toFixed(2):null;});}
    const r1=roll(v1),r2=roll(v2),rt=roll(vt);
    let ds2=[];
    if(w==='both')    ds2=[{label:'合计7日均',data:rt,borderColor:CT,backgroundColor:CT+'22',fill:true,tension:0.4,pointRadius:2,borderWidth:2}];
    else if(w==='w1') ds2=[{label:'一车间7日均',data:r1,borderColor:C1,backgroundColor:C1+'22',fill:true,tension:0.4,pointRadius:2,borderWidth:2}];
    else if(w==='w2') ds2=[{label:'二车间7日均',data:r2,borderColor:C2,backgroundColor:C2+'22',fill:true,tension:0.4,pointRadius:2,borderWidth:2}];
    else ds2=[{label:'一车间7日均',data:r1,borderColor:C1,backgroundColor:C1+'22',fill:true,tension:0.4,pointRadius:2,borderWidth:2},{label:'二车间7日均',data:r2,borderColor:C2,backgroundColor:C2+'22',fill:true,tension:0.4,pointRadius:2,borderWidth:2}];
    ch2=new Chart(document.getElementById('c2'),{type:'line',data:{labels,datasets:ds2},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,position:'top',labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.parsed.y??'-'} 吨`}}},scales:{x:{ticks:{autoSkip:true,maxTicksLimit:28,maxRotation:60,font:{size:10}},grid:{display:false}},y:{ticks:{callback:v=>v+'吨',font:{size:11}},grid:{color:'#eee'}}}}});
  }
}

function update(){renderMetrics();renderStats();renderCharts();}
update();
</script>
</body>
</html>
